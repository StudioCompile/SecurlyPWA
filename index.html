<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="theme-color" content="#111827" />
    <link rel="manifest" href="./manifest.json" />
    <title>Simple PWA</title>
    <style>
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        margin: 0;
        padding: 24px;
        background: #0b1220;
        color: #e5e7eb;
      }
      a {
        color: #60a5fa;
      }
      .card {
        max-width: 720px;
        background: #111827;
        border: 1px solid #1f2937;
        border-radius: 12px;
        padding: 18px 18px;
      }
      button {
        appearance: none;
        border: 1px solid #374151;
        background: #0f172a;
        color: #e5e7eb;
        padding: 10px 14px;
        border-radius: 10px;
        cursor: pointer;
        font-weight: 600;
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .hidden {
        display: none;
      }
      .status {
        margin-top: 12px;
        font-size: 14px;
        color: #cbd5e1;
        line-height: 1.4;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1 style="margin-top:0">Simple PWA</h1>

      <p>
        Link to
        <a href="https://www.google.com/" rel="noopener">Google</a>
        and
        <a href="https://securly.com/" rel="noopener">securly</a>
        .
      </p>

      <div id="installWrap">
        <button id="installBtn" class="hidden" type="button">Install app</button>
        <div id="status" class="status"></div>
      </div>
    </div>

    <script>
      const statusEl = document.getElementById('status');
      const installBtn = document.getElementById('installBtn');

      function setStatus(msg) {
        statusEl.textContent = msg;
      }

      async function registerSW() {
        if (!('serviceWorker' in navigator)) return;
        try {
          await navigator.serviceWorker.register('./service-worker.js');
          setStatus('Service worker registered.');
        } catch (err) {
          setStatus('Service worker registration failed.');
          // Keep details minimal in UI.
          console.error(err);
        }
      }

      function isStandalone() {
        return matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
      }

      let deferredPrompt = null;

      window.addEventListener('beforeinstallprompt', (e) => {
        // Allows a custom "Install" UI instead of the browser's default.
        e.preventDefault();
        deferredPrompt = e;
        installBtn.classList.remove('hidden');
        setStatus('Install prompt is ready. Click “Install app”.');
      });

      installBtn.addEventListener('click', async () => {
        if (!deferredPrompt) return;
        try {
          await deferredPrompt.prompt();
          const choice = await deferredPrompt.userChoice;
          setStatus(`Install choice: ${choice?.outcome ?? 'unknown'}`);
        } catch (err) {
          console.error(err);
          setStatus('Install prompt failed.');
        } finally {
          deferredPrompt = null;
          installBtn.classList.add('hidden');
        }
      });

      // Hide the button if we're already installed.
      if (isStandalone()) {
        setStatus('App is already installed (standalone mode).');
      }

      registerSW();
    </script>
  </body>
</html>
